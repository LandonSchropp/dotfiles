onboarding = false

[keys]
previous_tab = "cmd+h"
next_tab = "cmd+l"
new_tab = "cmd+t"
close_tab = "cmd+w"
rename_tab = "cmd+r"
previous_workspace = "cmd+k"
next_workspace = "cmd+j"
close_workspace = "cmd+shift+w"
rename_workspace = "cmd+shift+r"
switch_workspace = "cmd+1..9"
toggle_sidebar = "cmd+s"
help = "cmd+/"

[[keys.command]]
key = "cmd+n"
type = "plugin_action"
command = "landonschropp.herdr-project.project"
description = "open project picker"

[theme]
name = "tokyo-night"

[ui]
agent_panel_sort = "spaces"
show_agent_labels_on_pane_borders = false

[ui.sound]
enabled = false
